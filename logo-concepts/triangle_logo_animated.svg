<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="btClipAnim">
      <polygon points="50,309.8 350,309.8 200,223.2"/>
    </clipPath>
    <style>
      /* Phase 1: Draw outer triangle (0s - 1.5s) */
      .outer-triangle {
        stroke-dasharray: 900;
        stroke-dashoffset: 900;
        animation: draw-outer 1.5s ease-in-out 0.3s forwards;
      }
      @keyframes draw-outer {
        to { stroke-dashoffset: 0; }
      }

      /* Phase 2: Draw inner lines (1.2s - 2.2s) */
      .inner-left {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: draw-inner 0.8s ease-in-out 1.2s forwards;
      }
      .inner-right {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: draw-inner 0.8s ease-in-out 1.4s forwards;
      }
      .inner-bottom {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: draw-inner 0.8s ease-in-out 1.6s forwards;
      }
      @keyframes draw-inner {
        to { stroke-dashoffset: 0; }
      }

      /* Phase 3: Fan rays appear (2s - 3.5s) */
      .fan-ray {
        opacity: 0;
        animation: fade-ray 0.08s ease-out forwards;
      }
      @keyframes fade-ray {
        to { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Black background -->
  <rect width="400" height="400" fill="#000000"/>

